backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "conteudo"
    label: "Conteúdo do site"
    files:
      - name: "posts"
        label: "Publicações"
        file: "data/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.titulo}} — {{fields.categoria}}"
            collapsed: true
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Resumo", name: "resumo", widget: "text", required: false, hint: "Resumo curto usado nos cards e no topo do artigo." }
              - { label: "Data", name: "data", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                default: "ultimas"
                options:
                  - { label: "NBA", value: "nba" }
                  - { label: "Auto-Falante", value: "auto-falante" }
                  - { label: "Últimas", value: "ultimas" }
                  - { label: "In English", value: "in-english" }
                  - { label: "Extensos", value: "extensos" }
                  - { label: "Lapsos", value: "lapsos" }
                  - { label: "Mastigado", value: "mastigado" }
              - { label: "Imagem principal", name: "imagem", widget: "image", required: false, hint: "Se ficar vazio, o site usa um placeholder escuro." }
              - { label: "Autor", name: "autor", widget: "string", required: false, default: "Arthur Salazar" }
              - { label: "Tempo de leitura", name: "tempoLeitura", widget: "string", required: false, default: "5 min de leitura" }
              - { label: "Slug", name: "slug", widget: "string", hint: "Nome curto sem espaços. Exemplo: brasileiros-no-college" }
              - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Opcional. Uma tag por linha." }
              - { label: "Destaque principal", name: "destaque", widget: "boolean", required: false, default: false, hint: "Aparece no card principal da página Por Escrito." }
              - { label: "Card lateral", name: "lateral", widget: "boolean", required: false, default: false, hint: "Use em no máximo dois posts para os cards laterais do topo." }
              - { label: "Corpo do texto", name: "corpo", widget: "markdown", required: false }
